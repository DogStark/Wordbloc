version: '3.8'

# Local development services for the backend persistence layer (see backend/README.md).
# Credentials match the defaults in backend/.env.example so `docker compose up -d`
# works out of the box with an unmodified .env.

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spellbloc_dev
    ports:
      - "5432:5432"
    volumes:
      - spellbloc_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - spellbloc_redis_data:/data

volumes:
  spellbloc_postgres_data:
  spellbloc_redis_data:
